<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Kanban Task Board</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<h1>Kanban Task Board</h1>
		<div class="badge" id="taskCounter">0 tasks</div>
		<select class="priorityFilter" id="priorityFilter" name="priorityFilter">
			<option value="allPriorities">All Priorities</option>
			<option value="high">High</option>
			<option value="medium">Medium</option>
			<option value="low">Low</option>
		</select>
		<button id="clearAllBtn">Clear All</button>
	</header>

	<main class="grid">
		<section id="todo">
			<h2>To Do</h2>
			<ul></ul>
			<button data-column="todo">+ Add Task</button>
		</section>

		<section id="inprogress">
			<h2>In Progress</h2>
			<ul></ul>
			<button data-column="inprogress">+ Add Task</button>
		</section>

		<section id="done">
			<h2>Done</h2>
			<ul></ul>
			<button data-column="done">+ Add Task</button>
		</section>
	</main>

	<!--Modal-->
	<div class="modal hidden" id="taskModal">
		<div class="modal-content">
			<h3>Add Task</h3>
			<div class="form-group">
				<label for="taskTitle">Title:</label>
				<input type="text" id="taskTitle" placeholder="Task Title">
			</div>

			<div class="form-group">
				<label for="taskDesc">Description:</label>
				<textarea id="taskDesc" rows="2" placeholder="Write something..."></textarea>
			</div>

			<div class="form-group">
				<label for="taskPriority">Priority:</label>
				<select id="taskPriority">
					<option value="high">High</option>
					<option value="medium">Medium</option>
					<option value="low">Low</option>
				</select>
			</div>

			<div class="form-group">
				<label for="taskDate">Due Date:</label>
				<input type="date" id="taskDate" name="taskDate">
			</div>

			<div class="modal-actions">
				<button id="saveTaskBtn">Save</button>
				<button id="cancelTaskBtn">Cancel</button>
			</div>
		</div>
	</div>
	<script src="taskmanager.js"></script>
</body>
</html>
